<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAV Avianca - Business Intelligence Ocupación</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAYICM3gHJmz4jjbyWggYmP74N29p7cRi0",
            authDomain: "brigada-cav-av.firebaseapp.com",
            databaseURL: "https://brigada-cav-av-default-rtdb.firebaseio.com",
            projectId: "brigada-cav-av",
            storageBucket: "brigada-cav-av.firebasestorage.app",
            messagingSenderId: "298922826435",
            appId: "1:298922826435:web:6601ad95a3f865b7062076"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('registros');

        tailwind.config = { theme: { extend: { colors: { avianca: '#E11328', premium: '#1a1a1a', accent: '#005596' } } } }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .active-tab { border-bottom: 3px solid #E11328; color: #E11328; }
    </style>
</head>
<body class="text-slate-800">
    <nav class="bg-premium text-white sticky top-0 z-50 shadow-2xl border-b border-avianca">
        <div class="max-w-full mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-building text-avianca text-xl"></i>
                <div class="h-6 w-px bg-gray-600"></div>
                <span class="font-light tracking-widest text-sm uppercase">CAV | Gestión de Activos</span>
            </div>
            <div id="nav-controls" class="hidden flex items-center space-x-6">
                <button onclick="logout()" class="hover:text-avianca transition text-sm font-semibold flex items-center">
                    <i class="fa-solid fa-power-off mr-2"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div id="login-view" class="flex items-center justify-center min-h-[90vh] p-4">
        <div class="glass-card p-10 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100 text-center">
            <h1 class="text-3xl font-bold mb-2">Bienvenido</h1>
            <p class="text-slate-500 mb-8">Sistema Integrado de Control Edificio CAV</p>
            <div class="space-y-4">
                <button onclick="login('user')" class="w-full bg-avianca hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                    <i class="fa-solid fa-mobile-screen-button mr-2"></i> Registro Colaborador
                </button>
                <button onclick="login('admin')" class="w-full bg-premium hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                    <i class="fa-solid fa-chart-line mr-2"></i> Dashboard Ejecutivo
                </button>
            </div>
        </div>
    </div>

    <div id="user-view" class="hidden max-w-md mx-auto py-8 px-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <form onsubmit="handleRegistration(event)" class="space-y-4">
                <input type="text" id="nombre" placeholder="Nombre Completo" required class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-avianca outline-none">
                <input type="number" id="documento" placeholder="ID / Documento" required class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-avianca outline-none">
                <select id="piso" required class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200">
                    <option value="" disabled selected>Piso</option>
                    <script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">Piso ${i}</option>`);</script>
                </select>
                <select id="costado" required class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200">
                    <option value="" disabled selected>Costado</option>
                    <option value="Norte">Norte</option><option value="Sur">Sur</option><option value="Centro">Centro</option>
                </select>
                <div id="msg-container" class="hidden p-3 rounded-lg text-sm text-center font-bold"></div>
                <button type="submit" class="w-full bg-avianca text-white py-4 rounded-xl font-bold shadow-lg">Completar Registro</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="hidden p-6 max-w-[1600px] mx-auto">
        <div class="flex space-x-8 mb-8 border-b">
            <button onclick="switchTab('tab-stats')" class="pb-4 font-semibold active-tab">Vista General</button>
            <button onclick="switchTab('tab-data')" class="pb-4 font-semibold">Gestión de Datos</button>
        </div>
        <div id="tab-stats" class="tab-content"><canvas id="floorChart" height="100"></canvas></div>
        <div id="tab-data" class="tab-content hidden"><table class="w-full"><tbody id="table-body"></tbody></table></div>
    </div>

    <script>
        let db = [];
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            db = data ? Object.values(data) : [];
            updateDashboard();
        });

        function handleRegistration(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const documento = document.getElementById('documento').value;
            const piso = document.getElementById('piso').value;
            const costado = document.getElementById('costado').value;
            const now = new Date();
            const newPostKey = database.ref('registros').push().key;
            
            database.ref('registros/' + newPostKey).set({
                id: newPostKey, nombre, documento, piso, costado,
                fecha: now.toLocaleDateString('es-CO'),
                hora: now.toLocaleTimeString('es-CO'),
                timestamp: now.getTime()
            });
            alert('¡Registro exitoso!');
            e.target.reset();
        }

        function login(role) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('nav-controls').classList.remove('hidden');
            if(role === 'user') document.getElementById('user-view').classList.remove('hidden');
            else document.getElementById('admin-view').classList.remove('hidden');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function logout() { window.location.reload(); }
        function updateDashboard() { renderTable(); }
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = db.map(r => `<tr><td class="p-4">${r.nombre}</td><td class="p-4">${r.piso}</td></tr>`).join('');
        }
    </script>
</body>
</html>
