<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAV Avianca - Business Intelligence Ocupación</title>
    
    <!-- Librerías Externas -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAYICM3gHJmz4jjbyWggYmP74N29p7cRi0",
            authDomain: "brigada-cav-av.firebaseapp.com",
            databaseURL: "https://brigada-cav-av-default-rtdb.firebaseio.com",
            projectId: "brigada-cav-av",
            storageBucket: "brigada-cav-av.firebasestorage.app",
            messagingSenderId: "298922826435",
            appId: "1:298922826435:web:6601ad95a3f865b7062076"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const registrosRef = database.ref('registros');

        tailwind.config = { theme: { extend: { colors: { avianca: '#E11328', premium: '#1a1a1a', accent: '#005596' } } } }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .active-tab { border-bottom: 3px solid #E11328; color: #E11328; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-premium text-white sticky top-0 z-50 shadow-2xl border-b border-avianca">
        <div class="max-w-full mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-building text-avianca text-xl"></i>
                <span class="font-light tracking-widest text-sm uppercase">CAV | Gestión de Activos</span>
            </div>
            <div id="nav-controls" class="hidden flex items-center space-x-6">
                <button onclick="logout()" class="hover:text-avianca transition text-sm font-semibold">
                    <i class="fa-solid fa-power-off mr-2"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <!-- Login -->
    <div id="login-view" class="flex items-center justify-center min-h-[80vh] p-4">
        <div class="glass-card p-10 rounded-2xl shadow-2xl w-full max-w-md text-center border">
            <h1 class="text-3xl font-bold mb-2">Bienvenido</h1>
            <p class="text-slate-500 mb-8">Sistema Integrado de Control Edificio CAV</p>
            <button onclick="login('user')" class="w-full bg-avianca text-white font-bold py-4 rounded-xl mb-4 shadow-lg hover:bg-red-700">Registro Colaborador</button>
            <button onclick="login('admin')" class="w-full bg-premium text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black">Dashboard Ejecutivo</button>
        </div>
    </div>

    <!-- User Check-in -->
    <div id="user-view" class="hidden max-w-md mx-auto py-8 px-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl border">
            <h2 class="font-bold text-xl mb-6">Check-in Diario</h2>
            <form onsubmit="handleRegistration(event)" class="space-y-4">
                <input type="text" id="nombre" placeholder="Nombre Completo" required class="w-full p-4 bg-gray-50 rounded-xl border">
                <input type="text" id="documento" placeholder="ID / Documento" required class="w-full p-4 bg-gray-50 rounded-xl border">
                <select id="piso" required class="w-full p-4 bg-gray-50 rounded-xl border">
                    <option value="" disabled selected>Piso</option>
                    <option value="1">Piso 1</option><option value="2">Piso 2</option><option value="3">Piso 3</option>
                </select>
                <select id="costado" required class="w-full p-4 bg-gray-50 rounded-xl border">
                    <option value="" disabled selected>Costado</option>
                    <option value="Norte">Norte</option><option value="Sur">Sur</option><option value="Centro">Centro</option>
                </select>
                <button type="submit" class="w-full bg-avianca text-white py-4 rounded-xl font-bold hover:bg-red-700">Registrar Ingreso</button>
            </form>
            <div id="msg-container" class="hidden mt-4 p-3 text-center rounded-lg"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-view" class="hidden p-6 max-w-[1400px] mx-auto">
        <div class="flex space-x-8 mb-8 border-b">
            <button onclick="switchTab('tab-stats')" id="btn-tab-stats" class="pb-4 font-semibold active-tab">Dashboard</button>
            <button onclick="switchTab('tab-data')" id="btn-tab-data" class="pb-4 font-semibold text-slate-400">Datos</button>
        </div>
        
        <div id="tab-stats" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow border"><p class="text-xs text-gray-400">Total Hoy</p><h3 id="stat-total" class="text-3xl font-bold">0</h3></div>
            </div>
            <canvas id="floorChart" class="bg-white p-6 rounded-2xl shadow"></canvas>
        </div>

        <div id="tab-data" class="tab-content hidden">
            <table class="w-full bg-white rounded-2xl shadow text-left">
                <thead class="bg-gray-50 uppercase text-xs text-gray-500"><tr><th class="px-6 py-4">Nombre</th><th class="px-6 py-4">Piso</th><th class="px-6 py-4">Acción</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let db = [];
        let floorChartInstance = null;

        // Firebase Sync
        registrosRef.on('value', (snapshot) => {
            const data = snapshot.val();
            db = data ? Object.values(data) : [];
            updateDashboard();
        });

        function login(role) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('nav-controls').classList.remove('hidden');
            if (role === 'user') document.getElementById('user-view').classList.remove('hidden');
            else document.getElementById('admin-view').classList.remove('hidden');
        }

        function handleRegistration(e) {
            e.preventDefault();
            const id = registrosRef.push().key;
            const reg = {
                id: id,
                nombre: document.getElementById('nombre').value,
                piso: document.getElementById('piso').value,
                costado: document.getElementById('costado').value,
                timestamp: Date.now()
            };
            registrosRef.child(id).set(reg);
            showMsg('Registro Exitoso', 'success');
            e.target.reset();
        }

        function showMsg(txt, type) {
            const msg = document.getElementById('msg-container');
            msg.textContent = txt;
            msg.className = `p-3 rounded text-sm ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            msg.classList.remove('hidden');
        }

        function updateDashboard() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = db.map(r => `<tr><td class="px-6 py-4">${r.nombre}</td><td class="px-6 py-4">${r.piso}</td><td class="px-6 py-4"><button onclick="deleteRow('${r.id}')" class="text-red-500">Eliminar</button></td></tr>`).join('');
            document.getElementById('stat-total').innerText = db.length;
        }

        function deleteRow(id) { registrosRef.child(id).remove(); }
        function logout() { location.reload(); }
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
        }
    </script>
</body>
</html>
